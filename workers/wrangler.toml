name = "epic-studio-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
EPIC_SEARCH_URL = "http://158.247.193.215:8788"

# Set via: wrangler secret put GEMINI_API_KEY
# GEMINI_API_KEY =

[[d1_databases]]
binding = "EPIC_DB"
database_name = "epic-studio-db"
database_id = "d9d2f91e-0303-4479-bfac-91da125a3695"

[[r2_buckets]]
binding = "EPIC_STORAGE"
bucket_name = "epic-studio-storage"

[[kv_namespaces]]
binding = "EPIC_KV"
id = "05f16e431a68467ca7c0dfc31ad9f77c"

[dev]
port = 8787

[env.production]
name = "epic-studio-api"
